name: permission-policy-drift-check

on:
  pull_request:
    paths:
      - 'config/permission-matrix.json'
      - 'src/types/permissionMatrix.generated.ts'
      - 'supabase/functions/_shared/permissionMatrix.generated.ts'
      - 'scripts/generate-permission-matrix.mjs'
      - 'scripts/check-permission-matrix-drift.mjs'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run permissions:drift
