name: Scheduled E2E Staging

on:
  schedule:
    # 7:00 AM UTC daily
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Override base URL (defaults to secrets.E2E_STAGING_BASE_URL)'
        required: false
        type: string
      grep:
        description: 'Optional Playwright --grep filter'
        required: false
        type: string
      notify_slack:
        description: 'Send Slack summary notification'
        required: false
        default: true
        type: boolean

concurrency:
  group: e2e-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '20.19.0'
  PLAYWRIGHT_JUNIT_OUTPUT_NAME: junit.xml

jobs:
  e2e-staging:
    name: E2E Staging Verification
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PLAYWRIGHT_TEST_BASE_URL: ${{ inputs.target_url || secrets.E2E_STAGING_BASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.E2E_VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_VITE_SUPABASE_ANON_KEY }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.E2E_VITE_GOOGLE_MAPS_API_KEY }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      CHRAVEL_E2E_RELEASE_GATE: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve Playwright command
        shell: bash
        run: |
          set -euo pipefail
          CMD="npx playwright test --project=chromium"
          if [ -n "${{ inputs.grep }}" ]; then
            CMD="$CMD --grep '${{ inputs.grep }}'"
          fi
          echo "PLAYWRIGHT_CMD=$CMD" >> "$GITHUB_ENV"

      - name: Run staging E2E suite
        id: playwright
        shell: bash
        run: |
          set -o pipefail
          eval "$PLAYWRIGHT_CMD"

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-staging-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Scheduled E2E Staging Run"
            echo ""
            echo "- **Run URL:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- **Target URL:** ${PLAYWRIGHT_TEST_BASE_URL}"
            echo "- **Command:** \\`${PLAYWRIGHT_CMD}\\`"
            echo "- **Result:** ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: always() && (github.event_name == 'schedule' || inputs.notify_slack == true)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "CI_SLACK_WEBHOOK_URL not configured; skipping Slack notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            STATUS_EMOJI=":white_check_mark:"
            STATUS_TEXT="PASSED"
          else
            STATUS_EMOJI=":x:"
            STATUS_TEXT="FAILED"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "text": "${STATUS_EMOJI} Chravel scheduled staging E2E ${STATUS_TEXT}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${STATUS_EMOJI} *Chravel scheduled staging E2E ${STATUS_TEXT}*"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${{ github.repository }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n${{ github.ref_name }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Target URL:*\n${PLAYWRIGHT_TEST_BASE_URL}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Open workflow run>"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
