name: Deploy Supabase Functions

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Function to deploy (or "all" for all functions)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - create-trip
          - join-trip
          - dispatch-notification-deliveries
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy single function
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.function_name != 'all'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy ${{ github.event.inputs.function_name }} --project-ref $PROJECT_ID

      - name: Deploy all functions
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.function_name == 'all')
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase functions deploy --project-ref $PROJECT_ID

      - name: Post-deploy health check
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Waiting 5s for functions to initialize..."
          sleep 5
          HTTP_STATUS=$(curl -sf -o /tmp/health-response.json -w '%{http_code}' \
            "https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/health" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed (HTTP 200)"
            cat /tmp/health-response.json | python3 -m json.tool 2>/dev/null || true
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS (non-blocking)"
            cat /tmp/health-response.json 2>/dev/null || true
          fi
        continue-on-error: true

      - name: Deployment summary
        run: |
          echo "## Edge Function Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: Chravel Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Function**: ${{ github.event.inputs.function_name || 'triggered by push' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
