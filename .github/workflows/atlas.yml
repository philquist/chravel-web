name: Atlas

# Refreshes the Codebase Architecture Atlas metrics and publishes codebase-atlas/
# to GitHub Pages. Manual-dispatch only — runs solely when you trigger it from the
# Actions tab, never automatically on merge. Publish-only: nothing is committed back
# to the repo (the tracked index.html / architecture-data.json are refreshed only on
# demand — never as a side effect of routine work).
# The judgment layer (curated.json) is refreshed separately via the codebase-atlas skill.

on:
  workflow_dispatch:

concurrency:
  group: atlas-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20.19.0'
  # Build-time placeholders so `vite build` succeeds in CI (mirrors ci.yml).
  VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
  VITE_SUPABASE_ANON_KEY: 'sb_publishable_ci_placeholder'
  VITE_GOOGLE_MAPS_API_KEY: 'STUB_MAPS_KEY_CI'

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build (produces dist/ for bundle metrics)
        run: npm run build

      - name: Refresh atlas metrics
        run: npm run atlas

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload atlas as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: codebase-atlas

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
