name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '20 7 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '20.19.0'
  # Heavy Concierge / MobileTripTabs specs allocate well past Node's default ~2GB
  # heap on jsdom+forks workers (local cloud agents OOM even at 8–12GB when the
  # full suite mounts). Give CI shards headroom so Search/isActive + waveform
  # regressions can finish instead of dying mid-import.
  NODE_OPTIONS: '--max-old-space-size=8192'
  VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
  VITE_SUPABASE_ANON_KEY: 'sb_publishable_ci_placeholder'
  VITE_GOOGLE_MAPS_API_KEY: 'STUB_MAPS_KEY_CI'

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Security audit (dependencies)
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Run linter with warning budget
        run: npm run lint:budget
        env:
          ESLINT_WARNING_BASELINE: '1293'

      - name: Check Supabase schema drift
        run: npx tsx scripts/check-schema-drift.ts

      - name: Run type check
        run: npm run typecheck

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run QA guardrails
        run: npm run qa:guardrails

      - name: Validate environment variables
        run: npx tsx scripts/validate-env.ts --ci

      - name: Check edge function env coverage
        run: npx tsx scripts/check-env-coverage.ts

      - name: Lint migration files
        run: npx tsx scripts/lint-migrations.ts

  # The Vitest suite (~290 files × jsdom + coverage) outgrew a single 30-min job.
  # Split it across parallel shards so each finishes well under the timeout; a
  # downstream gate job re-exposes the original "Unit Tests (Vitest)" status name
  # so branch protection stays satisfied and only goes green when every shard does.
  unit-tests-shard:
    name: Unit Tests Shard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run unit tests with coverage (shard ${{ matrix.shard }}/4)
        run: npm run test:run:ci -- --shard=${{ matrix.shard }}/4

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unit-shard-${{ matrix.shard }}
          fail_ci_if_error: false
          disable_search: false
          verbose: true

  # Stable required-check name. Aggregates the shard matrix into one status so
  # branch protection can keep requiring "Unit Tests (Vitest)" unchanged.
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-24.04
    needs: unit-tests-shard
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify all shards passed
        run: |
          result="${{ needs.unit-tests-shard.result }}"
          echo "Vitest shard matrix result: $result"
          if [ "$result" != "success" ]; then
            echo "::error::One or more Vitest shards failed or were cancelled."
            exit 1
          fi
          echo "All Vitest shards passed."

  build:
    name: Build Web App
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build application
        run: npm run build

      - name: Bundle-size gate
        run: node scripts/check-bundle-size.cjs dist/assets/js

      - name: Upload web build artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke (PR)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [static-checks, unit-tests, build]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Download built web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_TEST_BASE_URL: 'http://localhost:8080'
          PLAYWRIGHT_SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-smoke-report
          path: test-results/
          retention-days: 14

  e2e-full:
    name: E2E Full (main/nightly)
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: [static-checks, unit-tests, build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Download built web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E tests
        run: npm run test:e2e
        env:
          CHRAVEL_E2E_RELEASE_GATE: '1'
          PLAYWRIGHT_TEST_BASE_URL: 'http://localhost:8080'
          PLAYWRIGHT_SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-full-report
          path: test-results/
          retention-days: 30
