name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '20 7 * * *'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NODE_VERSION: '20.19.0'
  VITE_SUPABASE_URL: 'https://ci-placeholder.supabase.co'
  VITE_SUPABASE_ANON_KEY: 'sb_publishable_ci_placeholder'
  VITE_GOOGLE_MAPS_API_KEY: 'STUB_MAPS_KEY_CI'

jobs:
  static-checks:
    name: Static Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Security audit (dependencies)
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Run linter with warning budget
        run: npm run lint:budget
        env:
          ESLINT_WARNING_BASELINE: '1293'

      - name: Check Supabase schema drift
        run: npx tsx scripts/check-schema-drift.ts

      - name: Run type check
        run: npm run typecheck

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run QA guardrails
        run: npm run qa:guardrails

      - name: Validate environment variables
        run: npx tsx scripts/validate-env.ts --ci

      - name: Check edge function env coverage
        run: npx tsx scripts/check-env-coverage.ts

      - name: Lint migration files
        run: npx tsx scripts/lint-migrations.ts

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Run unit tests with coverage
        run: npm run test:run:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          disable_search: false
          verbose: true

  build:
    name: Build Web App
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Build application
        run: npm run build

      - name: Bundle-size gate
        run: node scripts/check-bundle-size.cjs dist/assets/js

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  e2e-smoke:
    name: E2E Smoke (PR)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [static-checks, unit-tests, build]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Download built web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npm run test:e2e:smoke
        env:
          PLAYWRIGHT_TEST_BASE_URL: 'http://localhost:8080'
          PLAYWRIGHT_SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: test-results/
          retention-days: 14

  e2e-full:
    name: E2E Full (main/nightly)
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    needs: [static-checks, unit-tests, build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --fund=false

      - name: Download built web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: 'http://localhost:8080'
          PLAYWRIGHT_SKIP_BUILD: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-full-report
          path: test-results/
          retention-days: 30
