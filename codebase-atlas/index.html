<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chravel — Codebase Architecture Atlas</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141417;
        --surface2: #1c1c21;
        --surface3: #26262d;
        --border: #2c2c34;
        --text: #f4f4f6;
        --muted: #9a9aa4;
        --muted2: #6c6c76;
        --gold: #fbbf24;
        --gold-dim: #a9801f;
        --green: #34d399;
        --yellow: #fbbf24;
        --orange: #fb923c;
        --red: #f87171;
        --blue: #60a5fa;
        --purple: #c084fc;
        --gray: #8b8b95;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font:
          15px/1.55 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: var(--gold);
        text-decoration: none;
      }
      code {
        background: var(--surface3);
        padding: 1px 6px;
        border-radius: 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px;
        color: #ffe9b0;
        word-break: break-word;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }
      /* sidebar */
      .side {
        position: sticky;
        top: 0;
        align-self: flex-start;
        height: 100vh;
        width: 248px;
        flex: 0 0 248px;
        background: linear-gradient(180deg, #101013, #0a0a0b);
        border-right: 1px solid var(--border);
        padding: 20px 14px;
        overflow-y: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 12px var(--gold);
      }
      .brand b {
        font-size: 15px;
        letter-spacing: 0.3px;
      }
      .brand small {
        display: block;
        color: var(--muted2);
        font-size: 11px;
        margin-top: 2px;
      }
      .nav {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 13.5px;
        border: 1px solid transparent;
      }
      .nav a:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav a.active {
        background: var(--surface3);
        color: var(--text);
        border-color: var(--border);
      }
      .nav .num {
        color: var(--gold-dim);
        font-size: 11px;
        width: 18px;
        text-align: right;
      }
      /* main */
      .main {
        flex: 1;
        min-width: 0;
        padding: 34px 40px 80px;
        max-width: 1180px;
      }
      header.hero {
        margin-bottom: 26px;
      }
      header.hero h1 {
        font-size: 30px;
        margin: 0 0 6px;
        letter-spacing: -0.4px;
      }
      header.hero .tag {
        color: var(--muted);
        font-size: 15px;
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 12px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .pill b {
        color: var(--gold);
        font-weight: 600;
      }
      .stack-list {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .stack-list span {
        font-size: 11.5px;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 3px 8px;
      }
      section {
        margin: 40px 0;
        scroll-margin-top: 18px;
      }
      section h2 {
        font-size: 21px;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      section h2 .ix {
        color: var(--gold-dim);
        font-size: 13px;
        font-weight: 700;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 7px;
      }
      section .lead {
        color: var(--muted);
        margin: 0 0 18px;
        max-width: 80ch;
      }
      /* score heatmap */
      .scores {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .score {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      .score .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .score .lab {
        font-size: 13px;
        color: var(--muted);
      }
      .score .val {
        font-size: 24px;
        font-weight: 700;
      }
      .bar {
        height: 7px;
        border-radius: 99px;
        background: var(--surface3);
        margin: 9px 0 8px;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        border-radius: 99px;
      }
      .score .why {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      /* cards */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 14px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        border-left-width: 4px;
      }
      .card .hd {
        padding: 13px 15px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }
      .card .hd:hover {
        background: var(--surface2);
      }
      .card .hd h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }
      .card .hd .sub {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 3px;
      }
      .card .chev {
        color: var(--muted2);
        transition: transform 0.15s;
        flex: 0 0 auto;
        margin-top: 2px;
      }
      .card.open .chev {
        transform: rotate(90deg);
      }
      .card .bd {
        display: none;
        padding: 0 15px 15px;
        border-top: 1px solid var(--border);
        font-size: 13px;
      }
      .card.open .bd {
        display: block;
      }
      .kv {
        margin: 10px 0 0;
      }
      .kv .k {
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .kv .v {
        color: var(--text);
        margin-top: 2px;
      }
      .kv .v.muted {
        color: var(--muted);
      }
      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 9px;
      }
      .b {
        font-size: 10.5px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .tagrow {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .chip {
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
      }
      .risk {
        font-weight: 700;
      }
      ul.clean {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      ul.clean li {
        margin: 4px 0;
        color: var(--muted);
      }
      ul.clean li b {
        color: var(--text);
        font-weight: 600;
      }
      /* tables */
      .tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
      }
      .tbl th,
      .tbl td {
        text-align: left;
        padding: 9px 11px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .tbl th {
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .tbl tr:hover td {
        background: var(--surface2);
      }
      .tbl code {
        font-size: 11.5px;
      }
      /* search */
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 6px 0 16px;
        flex-wrap: wrap;
      }
      .toolbar input {
        flex: 1;
        min-width: 220px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 9px 13px;
        color: var(--text);
        font-size: 13.5px;
      }
      .toolbar input::placeholder {
        color: var(--muted2);
      }
      .toolbar .count {
        color: var(--muted2);
        font-size: 12.5px;
      }
      /* exec columns */
      .cols {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .panel h4 {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .summary {
        background: linear-gradient(135deg, #15110a, #121214);
        border: 1px solid var(--gold-dim);
        border-radius: 14px;
        padding: 18px 20px;
        margin-bottom: 18px;
      }
      .summary p {
        margin: 0;
        color: #f0e6d0;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 3px;
        margin-right: 5px;
        vertical-align: middle;
      }
      .foot {
        margin-top: 50px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        color: var(--muted2);
        font-size: 12px;
      }
      .copy {
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        border-radius: 6px;
        font-size: 10.5px;
        padding: 1px 7px;
        margin-left: 6px;
      }
      .copy:hover {
        color: var(--gold);
        border-color: var(--gold-dim);
      }
      .step {
        display: flex;
        gap: 10px;
        margin: 6px 0;
        align-items: baseline;
      }
      .step .lyr {
        flex: 0 0 84px;
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .step .det {
        color: var(--muted);
      }
      @media (max-width: 880px) {
        .side {
          display: none;
        }
        .main {
          padding: 22px 18px 60px;
        }
      }
    </style>
  </head>

          sec.appendChild(
            el(
              '<div class="panel"><table class="tbl"><thead><tr><th>Area</th><th>Impact</th><th>Priority</th><th>Note</th></tr></thead><tbody>' +
                rows +
                '</tbody></table></div>',
            ),
          );
        }

        function renderRoadmap(sec) {
          sec.appendChild(
            el(
              lead(
                'A practical sequence from safe deletions to scale readiness. Complexity: S/M/L/XL.',
              ),
            ),
          );
          D.roadmap.forEach(function (p, i) {
            var pc = [COLOR.green, COLOR.blue, COLOR.orange, COLOR.purple][i] || COLOR.gray;
            var rows = p.items
              .map(function (it) {
                return (
                  '<tr><td><b>' +
                  esc(it.desc) +
                  '</b><div class="sub" style="color:var(--muted2)"><code>' +
                  esc(it.files) +
                  '</code></div></td><td style="color:' +
                  riskColor(it.risk) +
                  '">' +
                  esc(it.risk) +
                  '</td><td>' +
                  esc(it.complexity) +
                  '</td><td class="muted">' +
                  esc(it.benefit) +
                  '</td><td class="muted">' +
                  esc(it.validation) +
                  '</td></tr>'
                );
              })
              .join('');
            sec.appendChild(
              el(
                '<div class="panel" style="margin-top:14px;border-left:4px solid ' +
                  pc +
                  '"><h4>' +
                  esc(p.phase) +
                  '</h4><table class="tbl"><thead><tr><th>Item</th><th>Risk</th><th>Effort</th><th>Benefit</th><th>Validation</th></tr></thead><tbody>' +
                  rows +
                  '</tbody></table></div>',
              ),
            );
          });
        }

        function renderGlossary(sec) {
          sec.appendChild(
            el(
              lead(
                'Plain-English definitions of the technical terms in this codebase — and why each matters to the business.',
              ),
            ),
          );
          var grid = el('<div class="grid"></div>');
          D.glossary.forEach(function (g) {
            grid.appendChild(
              el(
                '<div class="panel"><h4 style="text-transform:none;color:var(--text);font-size:14px">' +
                  esc(g.term) +
                  '</h4><div class="v muted" style="font-size:13px">' +
                  esc(g.plain) +
                  '</div><div class="v" style="font-size:12.5px;color:' +
                  COLOR.gold +
                  ';margin-top:6px">Why it matters: ' +
                  esc(g.why) +
                  '</div></div>',
              ),
            );
          });
          sec.appendChild(grid);
        }

        // ---- live metrics (auto-refreshed by scripts/build-atlas.mjs each merge) ----
        function renderLiveMetrics(sec) {
          var mt = m.metrics;
          if (!mt) return;
          var fresh = '';
          if (m.commit)
            fresh += '<span class="chip">commit <code>' + esc(m.commit) + '</code></span>';
          if (m.generated) fresh += '<span class="chip">refreshed ' + esc(m.generated) + '</span>';
          var rows = [];
          if (mt.knip)
            rows.push([
              'knip dead-code scan',
              'files ' +
                mt.knip.files +
                ' · deps ' +
                mt.knip.deps +
                ' · exports ' +
                mt.knip.exports +
                ' · types ' +
                mt.knip.types,
            ]);
          if (mt.anyCount != null) rows.push(['`any` usages in src/', mt.anyCount]);
          if (mt.todoCount != null) rows.push(['TODO / FIXME / HACK markers', mt.todoCount]);
          var statRows = rows
            .map(function (r) {
              return (
                '<tr><td class="muted">' +
                inlineCode(esc(r[0])) +
                '</td><td><b>' +
                esc(r[1]) +
                '</b></td><td></td></tr>'
              );
            })
            .join('');
          var bundle = (mt.bundle || [])
            .map(function (b) {
              return (
                '<tr><td><code>' +
                esc(b.name) +
                '</code></td><td><b style="color:' +
                (b.kb >= 500 ? COLOR.red : b.kb >= 250 ? COLOR.orange : COLOR.gray) +
                '">' +
                b.kb +
                ' kB</b></td><td class="muted">' +
                (b.gzipKb != null ? b.gzipKb + ' kB gzip' : '') +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.green +
                '"><h4>Live metrics — auto-refreshed each merge</h4>' +
                '<div class="tagrow" style="margin-bottom:8px">' +
                (fresh ||
                  '<span class="chip muted">static snapshot — run <code>npm run atlas</code> to refresh</span>') +
                '</div>' +
                '<table class="tbl"><thead><tr><th>Metric</th><th>Value</th><th>Note</th></tr></thead><tbody>' +
                statRows +
                (bundle
                  ? '<tr><td colspan="3" class="muted" style="padding-top:12px"><b>Largest JS bundle chunks</b></td></tr>' +
                    bundle
                  : '') +
                '</tbody></table></div>',
            ),
          );
        }

        // ---- footer ----
        document.getElementById('foot').innerHTML =
          'Generated ' +
          esc(m.generated) +
          ' · ' +
          esc(m.repo) +
          ' @ <code>' +
          esc(m.branch) +
          '</code>' +
          (m.commit ? ' · commit <code>' + esc(m.commit) + '</code>' : '') +
          '<br>Evidence sources: ' +
          m.sources.map(esc).join(' · ') +
          '<br>Analysis + artifact only — no production code was modified. Confidence labels reflect how directly each claim was verified.';

        // ---- interactions ----
        document.addEventListener('click', function (ev) {
          var hd = ev.target.closest('.hd');
          if (hd && !ev.target.classList.contains('copy')) {
            var card = hd.closest('.card');
            if (card) card.classList.toggle('open');
          }
          var cp = ev.target.closest('.copy');
          if (cp) {
            var t = cp.getAttribute('data-copy');
            navigator.clipboard ? navigator.clipboard.writeText(t) : 0;
            var o = cp.textContent;
            cp.textContent = 'copied';
            setTimeout(function () {
              cp.textContent = o;
            }, 1000);
            ev.stopPropagation();
          }
        });
        // scroll-spy
        var navLinks = Array.prototype.slice.call(document.querySelectorAll('.nav a'));
        var obs = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (en) {
              if (en.isIntersecting) {
                navLinks.forEach(function (a) {
                  a.classList.toggle('active', a.getAttribute('href') === '#' + en.target.id);
                });
              }
            });
          },
          { rootMargin: '-10% 0px -80% 0px' },
        );
        SECTIONS.forEach(function (s) {
          var n = document.getElementById(s.id);
          if (n) obs.observe(n);
        });
      })();
    </script>
  </body>
</html>
