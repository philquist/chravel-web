<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chravel — Codebase Architecture Atlas</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141417;
        --surface2: #1c1c21;
        --surface3: #26262d;
        --border: #2c2c34;
        --text: #f4f4f6;
        --muted: #9a9aa4;
        --muted2: #6c6c76;
        --gold: #fbbf24;
        --gold-dim: #a9801f;
        --green: #34d399;
        --yellow: #fbbf24;
        --orange: #fb923c;
        --red: #f87171;
        --blue: #60a5fa;
        --purple: #c084fc;
        --gray: #8b8b95;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font:
          15px/1.55 -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: var(--gold);
        text-decoration: none;
      }
      code {
        background: var(--surface3);
        padding: 1px 6px;
        border-radius: 5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12.5px;
        color: #ffe9b0;
        word-break: break-word;
      }
      .layout {
        display: flex;
        min-height: 100vh;
      }
      /* sidebar */
      .side {
        position: sticky;
        top: 0;
        align-self: flex-start;
        height: 100vh;
        width: 248px;
        flex: 0 0 248px;
        background: linear-gradient(180deg, #101013, #0a0a0b);
        border-right: 1px solid var(--border);
        padding: 20px 14px;
        overflow-y: auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
      }
      .brand .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 12px var(--gold);
      }
      .brand b {
        font-size: 15px;
        letter-spacing: 0.3px;
      }
      .brand small {
        display: block;
        color: var(--muted2);
        font-size: 11px;
        margin-top: 2px;
      }
      .nav {
        margin-top: 18px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav a {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        padding: 7px 10px;
        border-radius: 8px;
        font-size: 13.5px;
        border: 1px solid transparent;
      }
      .nav a:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .nav a.active {
        background: var(--surface3);
        color: var(--text);
        border-color: var(--border);
      }
      .nav .num {
        color: var(--gold-dim);
        font-size: 11px;
        width: 18px;
        text-align: right;
      }
      /* main */
      .main {
        flex: 1;
        min-width: 0;
        padding: 34px 40px 80px;
        max-width: 1180px;
      }
      header.hero {
        margin-bottom: 26px;
      }
      header.hero h1 {
        font-size: 30px;
        margin: 0 0 6px;
        letter-spacing: -0.4px;
      }
      header.hero .tag {
        color: var(--muted);
        font-size: 15px;
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 12px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .pill b {
        color: var(--gold);
        font-weight: 600;
      }
      .stack-list {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .stack-list span {
        font-size: 11.5px;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 3px 8px;
      }
      section {
        margin: 40px 0;
        scroll-margin-top: 18px;
      }
      section h2 {
        font-size: 21px;
        margin: 0 0 4px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      section h2 .ix {
        color: var(--gold-dim);
        font-size: 13px;
        font-weight: 700;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 2px 7px;
      }
      section .lead {
        color: var(--muted);
        margin: 0 0 18px;
        max-width: 80ch;
      }
      /* score heatmap */
      .scores {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .score {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }
      .score .top {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }
      .score .lab {
        font-size: 13px;
        color: var(--muted);
      }
      .score .val {
        font-size: 24px;
        font-weight: 700;
      }
      .bar {
        height: 7px;
        border-radius: 99px;
        background: var(--surface3);
        margin: 9px 0 8px;
        overflow: hidden;
      }
      .bar > i {
        display: block;
        height: 100%;
        border-radius: 99px;
      }
      .score .why {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      /* cards */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 14px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        border-left-width: 4px;
      }
      .card .hd {
        padding: 13px 15px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
      }
      .card .hd:hover {
        background: var(--surface2);
      }
      .card .hd h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
      }
      .card .hd .sub {
        color: var(--muted);
        font-size: 12.5px;
        margin-top: 3px;
      }
      .card .chev {
        color: var(--muted2);
        transition: transform 0.15s;
        flex: 0 0 auto;
        margin-top: 2px;
      }
      .card.open .chev {
        transform: rotate(90deg);
      }
      .card .bd {
        display: none;
        padding: 0 15px 15px;
        border-top: 1px solid var(--border);
        font-size: 13px;
      }
      .card.open .bd {
        display: block;
      }
      .kv {
        margin: 10px 0 0;
      }
      .kv .k {
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .kv .v {
        color: var(--text);
        margin-top: 2px;
      }
      .kv .v.muted {
        color: var(--muted);
      }
      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 9px;
      }
      .b {
        font-size: 10.5px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .tagrow {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .chip {
        font-size: 11px;
        padding: 2px 9px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
      }
      .risk {
        font-weight: 700;
      }
      ul.clean {
        margin: 8px 0 0;
        padding-left: 18px;
      }
      ul.clean li {
        margin: 4px 0;
        color: var(--muted);
      }
      ul.clean li b {
        color: var(--text);
        font-weight: 600;
      }
      /* tables */
      .tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        margin-top: 8px;
      }
      .tbl th,
      .tbl td {
        text-align: left;
        padding: 9px 11px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      .tbl th {
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .tbl tr:hover td {
        background: var(--surface2);
      }
      .tbl code {
        font-size: 11.5px;
      }
      /* search */
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 6px 0 16px;
        flex-wrap: wrap;
      }
      .toolbar input {
        flex: 1;
        min-width: 220px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 9px 13px;
        color: var(--text);
        font-size: 13.5px;
      }
      .toolbar input::placeholder {
        color: var(--muted2);
      }
      .toolbar .count {
        color: var(--muted2);
        font-size: 12.5px;
      }
      /* exec columns */
      .cols {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .panel h4 {
        margin: 0 0 8px;
        font-size: 13px;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .summary {
        background: linear-gradient(135deg, #15110a, #121214);
        border: 1px solid var(--gold-dim);
        border-radius: 14px;
        padding: 18px 20px;
        margin-bottom: 18px;
      }
      .summary p {
        margin: 0;
        color: #f0e6d0;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .legend i {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 3px;
        margin-right: 5px;
        vertical-align: middle;
      }
      .foot {
        margin-top: 50px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
        color: var(--muted2);
        font-size: 12px;
      }
      .copy {
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        border-radius: 6px;
        font-size: 10.5px;
        padding: 1px 7px;
        margin-left: 6px;
      }
      .copy:hover {
        color: var(--gold);
        border-color: var(--gold-dim);
      }
      .step {
        display: flex;
        gap: 10px;
        margin: 6px 0;
        align-items: baseline;
      }
      .step .lyr {
        flex: 0 0 84px;
        color: var(--gold-dim);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .step .det {
        color: var(--muted);
      }
      @media (max-width: 880px) {
        .side {
          display: none;
        }
        .main {
          padding: 22px 18px 60px;
        }
      }
    </style>
  </head>

  "glossary": [
    {
      "term": "Hook (React)",
      "plain": "A reusable piece of screen logic (e.g. 'are we logged in?').",
      "why": "Most Chravel behavior lives in hooks; a buggy shared hook breaks many screens at once."
    },
    {
      "term": "Component",
      "plain": "A visual building block of the UI.",
      "why": "354 of them; oversized ones (god components) are slow to change and risky."
    },
    {
      "term": "State",
      "plain": "Data the app is currently holding (who's logged in, the open trip).",
      "why": "Server state (TanStack Query) vs client state (Zustand) must not drift."
    },
    {
      "term": "Edge function",
      "plain": "Small backend program that runs on demand (AI, webhooks, imports).",
      "why": "97 of them are where trust-sensitive work happens; each must check auth + secrets."
    },
    {
      "term": "RLS (Row-Level Security)",
      "plain": "Database rules deciding which rows a user may see/change.",
      "why": "Chravel's real security boundary — 756 policies; the client cannot be trusted."

    {
      "term": "Realtime subscription",
      "plain": "A live feed pushing new messages/notifications instantly.",

    {
      "term": "Webhook",
      "plain": "A 'ping' from an outside service (e.g. Stripe) telling us something happened.",
      "why": "Payment/subscription truth arrives by webhook; a missed one leaves billing state stale."
    },
    {
      "term": "Migration",
      "plain": "A versioned change to the database shape.",
      "why": "419 of them; destructive ones need a two-phase plan to avoid data loss."

    {
      "term": "Bucket",
      "plain": "Cloud folder for uploaded files (photos/videos).",
      "why": "Media storage; needs validation, signed URLs, and cleanup."
    },
    {
      "term": "Environment variable",
      "plain": "A named setting/secret provided at runtime (API keys).",
      "why": "Misconfigured/missing ones can fail open — a documented security risk here."
    },
    {
      "term": "Dependency",
      "plain": "An outside code package the app relies on.",
      "why": "Unused ones bloat the bundle and the security-audit surface; knip flagged 8 earlier but now reports 0 unused deps."
    },
    {
      "term": "Circular dependency",
      "plain": "Two files that need each other to load.",
      "why": "Causes subtle load-order bugs; worth scanning for in a follow-up."
    },
    {
      "term": "Dead code",
      "plain": "Code nothing uses anymore.",
      "why": "Confuses humans and AI editors; safe to remove only after verification."

    <script>
      (function () {
        'use strict';
        var D = JSON.parse(document.getElementById('atlas-data').textContent);
        var COLOR = {
          green: '#34d399',
          yellow: '#fbbf24',
          orange: '#fb923c',
          red: '#f87171',
          blue: '#60a5fa',
          purple: '#c084fc',
          gray: '#8b8b95',
        };
        // Defined here (before the render loop) so renderFiles/badge can use it — var assignments are not hoisted.
        var BADGE_COLOR = {
          Core: 'blue',
          'Well Designed': 'green',
          Feature: 'purple',
          Shared: 'blue',
          Utility: 'gray',
          Config: 'gray',
          Database: 'blue',
          API: 'blue',
          Auth: 'orange',
          UI: 'purple',
          State: 'blue',
          Test: 'green',
          Legacy: 'yellow',
          'Suspected Dead': 'red',
          Duplicate: 'orange',
          Risky: 'red',
          'Needs Docs': 'yellow',
          'Needs Tests': 'yellow',
          AI: 'purple',
        };
        function esc(s) {
          return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
          });
        }
        function el(html) {
          var t = document.createElement('template');
          t.innerHTML = html.trim();
          return t.content.firstChild;
        }
        function riskColor(r) {
          r = (r || '').toLowerCase();
          if (r.indexOf('very low') >= 0) return COLOR.green;
          if (r.indexOf('high') >= 0) return COLOR.red;
          if (r.indexOf('medium') >= 0) return COLOR.orange;
          if (r.indexOf('low') >= 0) return COLOR.green;
          return COLOR.gray;
        }
        function scoreColor(n) {
          if (n >= 80) return COLOR.green;
          if (n >= 70) return COLOR.yellow;
          if (n >= 60) return COLOR.orange;
          return COLOR.red;
        }
        function copyBtn(txt) {
          return '<button class="copy" data-copy="' + esc(txt) + '">copy path</button>';
        }

        var SECTIONS = [
          { id: 'overview', title: 'Executive Overview', render: renderOverview },
          { id: 'scores', title: 'Health Scores', render: renderScores },
          { id: 'system', title: 'System Map', render: renderSystem },
          { id: 'files', title: 'File Explorer', render: renderFiles },
          { id: 'deps', title: 'Dependency Graph', render: renderDeps },
          { id: 'features', title: 'Feature Map', render: renderFeatures },
          { id: 'flows', title: 'Data Flow Map', render: renderFlows },
          { id: 'backend', title: 'Backend / API / DB', render: renderBackend },
          { id: 'integrations', title: 'External Integrations', render: renderIntegrations },
          { id: 'dead', title: 'Dead / Stale Code', render: renderDead },
          { id: 'quality', title: 'Quality Review', render: renderQuality },
          { id: 'missing', title: 'Missing Pieces', render: renderMissing },
          { id: 'roadmap', title: 'Refactor Roadmap', render: renderRoadmap },
          { id: 'cost', title: 'Cost to Build', render: renderCost },
          { id: 'glossary', title: 'Founder Glossary', render: renderGlossary },
        ];

        // ---- hero ----
        var m = D.meta,
          hero = document.getElementById('hero');
        var pills = Object.keys(m.stats)
          .map(function (k) {
            return '<span class="pill"><b>' + esc(m.stats[k]) + '</b> ' + esc(k) + '</span>';
          })
          .join('');
        var stack = m.stack
          .map(function (s) {
            return '<span>' + esc(s) + '</span>';
          })
          .join('');
        hero.innerHTML =
          '<h1>' +
          esc(m.app) +
          ' — Codebase Architecture Atlas</h1>' +
          '<div class="tag">' +
          esc(m.tagline) +
          '</div>' +
          '<div class="pills">' +
          pills +
          '</div>' +
          '<div class="stack-list">' +
          stack +
          '</div>';

        // ---- nav ----
        var nav = document.getElementById('nav');
        SECTIONS.forEach(function (s, i) {
          nav.appendChild(
            el(
              '<a href="#' +
                s.id +
                '"><span class="num">' +
                (i + 1) +
                '</span>' +
                esc(s.title) +
                '</a>',
            ),
          );
        });

        // Scroll to sections via JS instead of relying on default #fragment
        // navigation. Some HTML-preview proxies inject a <base href> pointing at
        // the raw source; that makes a bare "#id" link resolve to the raw file
        // URL and navigate away from the rendered page. Handling the click here
        // keeps navigation working under any host (preview proxy, Pages, file://).
        nav.addEventListener('click', function (ev) {
          var a = ev.target.closest('a');
          if (!a) return;
          var href = a.getAttribute('href') || '';
          if (href.charAt(0) !== '#') return;
          var target = document.getElementById(href.slice(1));
          if (target) {
            ev.preventDefault();
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });

        // ---- sections ----
        var root = document.getElementById('sections');
        SECTIONS.forEach(function (s, i) {
          var sec = el('<section id="' + s.id + '"></section>');
          sec.appendChild(
            el('<h2><span class="ix">' + (i + 1) + '</span>' + esc(s.title) + '</h2>'),
          );
          s.render(sec);
          root.appendChild(sec);
        });

        function lead(t) {
          return '<p class="lead">' + esc(t) + '</p>';
        }
        function list(arr) {
          return (
            '<ul class="clean">' +
            arr
              .map(function (x) {
                return '<li>' + inlineCode(esc(x)) + '</li>';
              })
              .join('') +
            '</ul>'
          );
        }
        function inlineCode(s) {
          return String(s).replace(
            /(src\/[^\s,;]+|supabase\/[^\s,;]+|[A-Za-z0-9_]+\.(tsx|ts|py|js|md|sql|json))/g,
            '<code>$1</code>',
          );
        }

        function renderOverview(sec) {
          var e = D.executive;
          sec.appendChild(el('<div class="summary"><p>' + esc(e.whatItDoes) + '</p></div>'));
          var cols = el('<div class="cols"></div>');
          cols.appendChild(
            el('<div class="panel"><h4>Who it serves</h4>' + list(e.whoItServes) + '</div>'),
          );
          cols.appendChild(
            el('<div class="panel"><h4>Primary flows</h4>' + list(e.primaryFlows) + '</div>'),
          );
          cols.appendChild(
            el(
              '<div class="panel"><h4>Highest-leverage code</h4>' +
                list(e.highestLeverage) +
                '</div>',
            ),
          );
          sec.appendChild(cols);
          var cols2 = el('<div class="cols" style="margin-top:14px"></div>');
          cols2.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.red +
                '"><h4>Top 5 risks</h4>' +
                list(e.topRisks) +
                '</div>',
            ),
          );
          cols2.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.green +
                '"><h4>Top 5 safe cleanups</h4>' +
                list(e.topCleanups) +
                '</div>',
            ),
          );
          cols2.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.blue +
                '"><h4>Top 5 missing pieces</h4>' +
                list(e.topMissing) +
                '</div>',
            ),
          );
          sec.appendChild(cols2);
        }

        function renderScores(sec) {
          sec.appendChild(
            el(
              lead(
                'Each score is 0–100 with a written rationale. "Dead Code Risk" is inverted — higher means more risk.',
              ),
            ),
          );
          var g = el('<div class="scores"></div>');
          D.scores.forEach(function (s) {
            var c =
              s.key === 'deadcode'
                ? s.score >= 60
                  ? COLOR.red
                  : s.score >= 40
                    ? COLOR.orange
                    : COLOR.green
                : scoreColor(s.score);
            g.appendChild(

        // ---- cost to build from scratch (human-only; AI-assisted figure deliberately omitted) ----
        function renderCost(sec) {
          var ce = D.costEstimate;
          if (!ce) return;
          var t = ce.totals;
          var md = ce.model || {
            productiveHoursPerDay: 6,
            daysPerWeek: 5,
            hoursPerWeekPerDev: 30,
            hoursPerYearPerDev: 1500,
            weeksPerMonth: 4.33,
            teamEfficiency: [
              { devs: 1, factor: 1 },
              { devs: 2, factor: 1.8 },
              { devs: 3, factor: 2.5 },
            ],
          };
          function money(n) {
            if (n >= 1e6) return '$' + Math.round(n / 1e4) / 100 + 'M';
            if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';
            return '$' + n;
          }
          function fmt(n) {
            return Number(n).toLocaleString();
          }
          function pDays(h) {
            return Math.round(h / md.productiveHoursPerDay);
          }
          function pWeeks(h) {
            return Math.round(h / md.hoursPerWeekPerDev);
          }
          function dYears(h) {
            return (h / md.hoursPerYearPerDev).toFixed(1);
          }
          function effFor(devs) {
            var e = (md.teamEfficiency || []).filter(function (x) {
              return x.devs === devs;
            })[0];
            return e ? e.factor : devs;
          }
          function calWeeks(h, devs) {
            return Math.round(h / md.hoursPerWeekPerDev / effFor(devs));
          }
          function durTxt(h, devs) {
            var w = calWeeks(h, devs);
            return fmt(w) + ' wks (~' + (w / (md.weeksPerMonth || 4.33)).toFixed(1) + ' mo)';
          }
          var bands = [
            { key: 'conservative', label: 'Conservative' },
            { key: 'moderate', label: 'Moderate' },
            { key: 'high', label: 'High' },
          ];
          function bandLabel(k) {
            return (
              bands.filter(function (b) {
                return b.key === k;
              })[0] || { label: k }
            ).label;
          }
          var head = (ce.vendors || []).filter(function (v) {
            return v.headline;
          })[0] ||
            (ce.vendors || [])[1] || { tier: '', ratePoint: 0, team: 2 };

          sec.appendChild(el(lead(ce.lens)));

          // ---- headline trio ----
          var cols = el('<div class="cols" style="margin-bottom:14px"></div>');
          cols.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid var(--gold)"><h4>Rebuild effort — moderate band</h4>' +
                '<div class="val" style="font-size:30px;font-weight:800;color:var(--gold)">' +
                fmt(t.moderate) +
                ' hrs</div><div class="v muted" style="font-size:12.5px">≈ ' +
                fmt(pWeeks(t.moderate)) +
                ' person-weeks · ' +
                dYears(t.moderate) +
                ' dev-years · range ' +
                fmt(t.conservative) +
                '–' +
                fmt(t.high) +
                ' hrs</div></div>',
            ),
          );
          cols.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.green +
                '"><h4>Representative quote</h4>' +
                '<div class="val" style="font-size:30px;font-weight:800;color:' +
                COLOR.green +
                '">' +
                money(t.moderate * head.ratePoint) +
                '</div><div class="v muted" style="font-size:12.5px">moderate · ' +
                esc(head.tier) +
                ' (' +
                esc(head.teamLabel || head.team + ' devs') +
                ') · ' +
                durTxt(t.moderate, head.team) +
                '</div></div>',
            ),
          );
          cols.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.blue +
                '"><h4>What this is</h4><div class="v muted" style="font-size:12.5px">' +
                esc(ce.disclaimer) +
                '</div></div>',
            ),
          );
          sec.appendChild(cols);

          // ---- representative quote per vendor ----
          var repRows = (ce.vendors || [])
            .map(function (v) {
              var band = v.typicalBand || 'moderate';
              return (
                '<tr><td><b>' +
                esc(v.tier) +
                '</b><div class="sub" style="color:var(--muted2)">' +
                esc(v.teamLabel || v.team + ' devs') +
                ' · $' +
                v.rateLow +
                '–' +
                v.rateHigh +
                '/hr</div></td><td>' +
                esc(bandLabel(band)) +
                '</td><td><b style="color:' +
                COLOR.green +
                '">' +
                money(t[band] * v.ratePoint) +
                '</b></td><td class="muted">' +
                durTxt(t[band], v.team) +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="margin-top:14px;border-left:4px solid ' +
                COLOR.green +
                '"><h4>Representative quote per vendor</h4>' +
                '<div class="v muted" style="font-size:12px;margin-bottom:6px">The band each vendor type typically delivers, with its realistic cost and calendar duration.</div>' +
                '<table class="tbl"><thead><tr><th>Who builds it</th><th>Typical band</th><th>Quote</th><th>Realistic timeline</th></tr></thead><tbody>' +
                repRows +
                '</tbody></table></div>',
            ),
          );

          // ---- effort bands (one-developer-equivalent) ----
          var ebRows = bands
            .map(function (b) {
              var h = t[b.key];
              return (
                '<tr><td><b>' +
                b.label +
                '</b></td><td' +
                (b.key === 'moderate'
                  ? ' style="color:var(--gold);font-weight:700"'
                  : ' class="muted"') +
                '>' +
                fmt(h) +
                '</td><td class="muted">' +
                fmt(pDays(h)) +
                '</td><td class="muted">' +
                fmt(pWeeks(h)) +
                '</td><td class="muted">' +
                dYears(h) +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="margin-top:14px"><h4>Effort bands — one-developer-equivalent</h4>' +
                '<div class="v muted" style="font-size:12px;margin-bottom:6px">' +
                esc(md.patternNote || '') +
                '</div><table class="tbl"><thead><tr><th>Band</th><th>Engineering hours</th><th>Person-days</th><th>Person-weeks</th><th>Dev-years</th></tr></thead><tbody>' +
                ebRows +
                '</tbody></table><div class="v muted" style="font-size:11.5px;margin-top:6px">“Person-X” = effort for a single developer; divide by team size (next table) for calendar time. Basis: ' +
                md.productiveHoursPerDay +
                ' productive hrs/day × ' +
                md.daysPerWeek +
                ' days = ' +
                md.hoursPerWeekPerDev +
                ' hrs/week, ~' +
                fmt(md.hoursPerYearPerDev) +
                ' hrs/year.</div></div>',
            ),
          );

          // ---- realistic timeline matrix (team size × band) ----
          var tlRows = (ce.vendors || [])
            .map(function (v) {
              return (
                '<tr><td><b>' +
                esc(v.tier) +
                '</b><div class="sub" style="color:var(--muted2)">' +
                esc(v.teamLabel || v.team + ' devs') +
                ' · ' +
                effFor(v.team) +
                '× throughput</div></td>' +
                bands
                  .map(function (b) {
                    return (
                      '<td' +
                      (b.key === 'moderate' ? ' style="color:var(--gold)"' : ' class="muted"') +
                      '>' +
                      durTxt(t[b.key], v.team) +
                      '</td>'
                    );
                  })
                  .join('') +
                '</tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="margin-top:14px"><h4>Realistic timeline — calendar duration by team size × band</h4>' +
                '<table class="tbl"><thead><tr><th>Who builds it</th><th>Conservative</th><th>Moderate</th><th>High</th></tr></thead><tbody>' +
                tlRows +
                '</tbody></table><div class="v muted" style="font-size:11.5px;margin-top:6px">Calendar weeks = person-weeks ÷ team efficiency (1 dev = 1.0×, 2 devs = 1.8×, 3 devs = 2.5×). Months at ' +
                md.weeksPerMonth +
                ' weeks/month.</div></div>',
            ),
          );

          // ---- quotes (cost) matrix ----
          var vrows = (ce.vendors || [])
            .map(function (v) {
              return (
                '<tr><td><b>' +
                esc(v.tier) +
                '</b><div class="sub" style="color:var(--muted2)">' +
                esc(v.teamLabel || v.team + ' devs') +
                '</div></td><td class="muted">$' +
                v.rateLow +
                '–' +
                v.rateHigh +
                '/hr</td><td>' +
                money(t.conservative * v.ratePoint) +
                '</td><td><b style="color:var(--gold)">' +
                money(t.moderate * v.ratePoint) +
                '</b></td><td>' +
                money(t.high * v.ratePoint) +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="margin-top:14px"><h4>Quotes — vendor rate × effort band (cost = hours × rate)</h4>' +
                '<table class="tbl"><thead><tr><th>Who builds it</th><th>Blended rate</th><th>Conservative</th><th>Moderate</th><th>High</th></tr></thead><tbody>' +
                vrows +
                '<tr style="border-top:2px solid var(--gold-dim)"><td class="muted">Effort (engineering-hours)</td><td></td><td class="muted">' +
                fmt(t.conservative) +
                '</td><td class="muted">' +
                fmt(t.moderate) +
                '</td><td class="muted">' +
                fmt(t.high) +
                '</td></tr></tbody></table></div>',
            ),
          );

          // ---- where the hours go ----
          var frows = ce.features
            .map(function (f) {
              return (
                '<tr><td><b>' +
                esc(f.area) +
                '</b>' +
                (f.note
                  ? '<div class="sub" style="color:var(--muted2)">' + esc(f.note) + '</div>'
                  : '') +
                '</td><td class="muted">' +
                f.conservative +
                '</td><td><b>' +
                f.moderate +
                '</b></td><td class="muted">' +
                f.high +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="margin-top:14px"><h4>Where the hours go — engineering-hours by system</h4>' +
                '<table class="tbl"><thead><tr><th>System</th><th>Conservative</th><th>Moderate</th><th>High</th></tr></thead><tbody>' +
                frows +
                '<tr style="border-top:2px solid var(--gold-dim)"><td><b>Total</b></td><td><b>' +
                fmt(t.conservative) +
                ' hrs</b></td><td><b style="color:var(--gold)">' +
                fmt(t.moderate) +
                ' hrs</b></td><td><b>' +
                fmt(t.high) +
                ' hrs</b></td></tr></tbody></table></div>',
            ),
          );

          // ---- assumptions + why-not-more ----
          var cols2 = el('<div class="cols" style="margin-top:14px"></div>');
          cols2.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.blue +
                '"><h4>Assumptions</h4>' +
                list(ce.assumptions) +
                '</div>',
            ),
          );
          cols2.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.green +
                '"><h4>Why these are realistic, not inflated</h4>' +
                list(ce.whyNotMore) +
                '</div>',
            ),
          );
          sec.appendChild(cols2);

          if (ce.methodology)
            sec.appendChild(
              el(
                '<p class="lead" style="margin-top:12px;font-size:12.5px;color:var(--muted)"><b>How these are generated:</b> ' +
                  esc(ce.methodology) +
                  '</p>',
              ),
            );
          if (ce.note)
            sec.appendChild(
              el(
                '<p class="lead" style="font-size:12.5px;color:var(--muted2)">' +
                  esc(ce.note) +
                  '</p>',
              ),
            );
        }

        function renderGlossary(sec) {
          sec.appendChild(
            el(
              lead(
                'Plain-English definitions of the technical terms in this codebase — and why each matters to the business.',
              ),
            ),
          );
          var grid = el('<div class="grid"></div>');
          D.glossary.forEach(function (g) {
            grid.appendChild(
              el(
                '<div class="panel"><h4 style="text-transform:none;color:var(--text);font-size:14px">' +
                  esc(g.term) +
                  '</h4><div class="v muted" style="font-size:13px">' +
                  esc(g.plain) +
                  '</div><div class="v" style="font-size:12.5px;color:' +
                  COLOR.gold +
                  ';margin-top:6px">Why it matters: ' +
                  esc(g.why) +
                  '</div></div>',
              ),
            );
          });
          sec.appendChild(grid);
        }

        // ---- live metrics (auto-refreshed by scripts/build-atlas.mjs each merge) ----
        function renderLiveMetrics(sec) {
          var mt = m.metrics;
          if (!mt) return;
          var fresh = '';
          if (m.commit)
            fresh += '<span class="chip">commit <code>' + esc(m.commit) + '</code></span>';
          if (m.generated) fresh += '<span class="chip">refreshed ' + esc(m.generated) + '</span>';
          var rows = [];
          if (mt.knip)
            rows.push([
              'knip dead-code scan',
              'files ' +
                mt.knip.files +
                ' · deps ' +
                mt.knip.deps +
                ' · exports ' +
                mt.knip.exports +
                ' · types ' +
                mt.knip.types,
            ]);
          if (mt.anyCount != null) rows.push(['`any` usages in src/', mt.anyCount]);
          if (mt.todoCount != null) rows.push(['TODO / FIXME / HACK markers', mt.todoCount]);
          var statRows = rows
            .map(function (r) {
              return (
                '<tr><td class="muted">' +
                inlineCode(esc(r[0])) +
                '</td><td><b>' +
                esc(r[1]) +
                '</b></td><td></td></tr>'
              );
            })
            .join('');
          var bundle = (mt.bundle || [])
            .map(function (b) {
              return (
                '<tr><td><code>' +
                esc(b.name) +
                '</code></td><td><b style="color:' +
                (b.kb >= 500 ? COLOR.red : b.kb >= 250 ? COLOR.orange : COLOR.gray) +
                '">' +
                b.kb +
                ' kB</b></td><td class="muted">' +
                (b.gzipKb != null ? b.gzipKb + ' kB gzip' : '') +
                '</td></tr>'
              );
            })
            .join('');
          sec.appendChild(
            el(
              '<div class="panel" style="border-left:4px solid ' +
                COLOR.green +
                '"><h4>Live metrics — auto-refreshed each merge</h4>' +
                '<div class="tagrow" style="margin-bottom:8px">' +
                (fresh ||
                  '<span class="chip muted">static snapshot — run <code>npm run atlas</code> to refresh</span>') +
                '</div>' +
                '<table class="tbl"><thead><tr><th>Metric</th><th>Value</th><th>Note</th></tr></thead><tbody>' +
                statRows +
                (bundle
                  ? '<tr><td colspan="3" class="muted" style="padding-top:12px"><b>Largest JS bundle chunks</b></td></tr>' +
                    bundle
                  : '') +
                '</tbody></table></div>',
            ),
          );
        }

        // ---- footer ----
        document.getElementById('foot').innerHTML =
          'Generated ' +
          esc(m.generated) +
          ' · ' +
          esc(m.repo) +
          ' @ <code>' +
          esc(m.branch) +
          '</code>' +
          (m.commit ? ' · commit <code>' + esc(m.commit) + '</code>' : '') +
          '<br>Evidence sources: ' +
          m.sources.map(esc).join(' · ') +
          '<br>Analysis + artifact only — no production code was modified. Confidence labels reflect how directly each claim was verified.';

        // ---- interactions ----
        document.addEventListener('click', function (ev) {
          var hd = ev.target.closest('.hd');
          if (hd && !ev.target.classList.contains('copy')) {
            var card = hd.closest('.card');
            if (card) card.classList.toggle('open');
          }
          var cp = ev.target.closest('.copy');
          if (cp) {
            var t = cp.getAttribute('data-copy');
            navigator.clipboard ? navigator.clipboard.writeText(t) : 0;
            var o = cp.textContent;
            cp.textContent = 'copied';
            setTimeout(function () {
              cp.textContent = o;
            }, 1000);
            ev.stopPropagation();
          }
        });
        // scroll-spy
        var navLinks = Array.prototype.slice.call(document.querySelectorAll('.nav a'));
        var obs = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (en) {
              if (en.isIntersecting) {
                navLinks.forEach(function (a) {
                  a.classList.toggle('active', a.getAttribute('href') === '#' + en.target.id);
                });
              }
            });
          },
          { rootMargin: '-10% 0px -80% 0px' },
        );
        SECTIONS.forEach(function (s) {
          var n = document.getElementById(s.id);
          if (n) obs.observe(n);
        });
      })();
    </script>
  </body>
</html>
