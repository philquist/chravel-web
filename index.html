<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/chravel-pwa-icon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Cache-Control headers handled by hosting (vercel.json). Hashed asset filenames make caching safe. -->

    <!-- Build version for cache invalidation - replaced by Vite during build -->
    <meta name="build-version" content="__BUILD_VERSION__" />
    <title>ChravelApp</title>
    <!-- Cache buster: preview refresh 20260319b -->

    <!-- Security Headers -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://*.supabase.co https://*.googleapis.com https://maps.googleapis.com https://maps.gstatic.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://r2cdn.perplexity.ai; img-src 'self' data: blob: https://*.supabase.co https://*.googleapis.com https://*.gstatic.com https://maps.gstatic.com https://maps.googleapis.com https://*.ggpht.com https://*.stream-io-cdn.com; media-src 'self' blob: data: https://*.supabase.co https://*.stream-io-cdn.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.stream-io-api.com wss://*.stream-io-api.com https://maps.googleapis.com https://generativelanguage.googleapis.com wss://generativelanguage.googleapis.com https://ai.gateway.lovable.dev https://api.stripe.com; worker-src 'self' blob:; frame-src 'self' https://*.google.com https://google.com https://maps.google.com https://www.google.com https://*.googleapis.com https://*.gstatic.com https://js.stripe.com https://checkout.stripe.com; child-src 'self' https://*.google.com https://google.com https://maps.google.com https://www.google.com https://*.googleapis.com https://*.gstatic.com https://js.stripe.com https://checkout.stripe.com; base-uri 'self'; form-action 'self';"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChravelApp" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS App Icons -->
    <link rel="apple-touch-icon" href="/chravel-pwa-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/chravel-pwa-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/chravel-pwa-icon.png" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#c49746" />
    <meta name="msapplication-TileColor" content="#c49746" />

    <!-- Fonts: self-hosted Inter (eliminates ~300ms network fetch on cold start) -->

    <!-- iOS Safari viewport fixes -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <meta name="description" content="The Group Chat Travel App" />

    <link rel="preconnect" href="https://jmjiyekmxwsxkfnqwyaa.supabase.co" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      /* Neutral dark boot shell — no wordmark, no spinner. The marketing
         landing and app shells paint their own branding once mounted. */
      .app-suspense-fallback {
        min-height: 100vh;
        background: #000;
      }
    </style>


    <meta property="og:site_name" content="ChravelApp" />
    <meta property="og:image" content="https://chravel.app/chravelapp-social-20251219.png" />
    <meta name="twitter:image" content="https://chravel.app/chravelapp-social-20251219.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ChravelApp" />
    <meta name="twitter:title" content="ChravelApp" />
    <meta property="og:description" content="The Group Chat Travel App" />
    <meta name="twitter:description" content="The Group Chat Travel App" />
  </head>
  <body>
    <!-- Static splash: paints with the HTML, before any JS downloads or parses.
         createRoot().render() replaces it; main.tsx's Suspense fallback renders
         the same markup so the handoff is seamless. -->
    <div id="root">
      <div class="app-suspense-fallback"></div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
